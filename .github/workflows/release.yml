name: Build and Package Extension

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Package Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome Extension
        run: npm run build:chrome

      - name: Build Firefox Extension
        run: npm run build:firefox

      - name: Package Chrome Extension
        run: |
          rm -f json-query-tool-chrome.zip
          cd dist-chrome
          zip -r ../json-query-tool-chrome.zip *
          cd ..

      - name: Package Firefox Extension
        run: |
          rm -f json-query-tool-firefox.zip
          cd dist-firefox
          zip -r ../json-query-tool-firefox.zip *
          cd ..

      - name: Upload Chrome Artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-query-tool-chrome
          path: json-query-tool-chrome.zip

      - name: Upload Firefox Artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-query-tool-firefox
          path: json-query-tool-firefox.zip

      # Create a GitHub Release and attach the zip packages when a version tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            json-query-tool-chrome.zip
            json-query-tool-firefox.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to Google Chrome Web Store (using stable, version-locked npm CLI)
      - name: Publish to Chrome Web Store
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: |
          npx chrome-webstore-upload-cli@2.2.0 upload \
            --source "json-query-tool-chrome.zip" \
            --extension-id "ghohdnpenjaojhibcjkkmmmnckdgkbhf" \
            --client-id "${{ secrets.CHROME_CLIENT_ID }}" \
            --client-secret "${{ secrets.CHROME_CLIENT_SECRET }}" \
            --refresh-token "${{ secrets.CHROME_REFRESH_TOKEN }}" \
            --auto-publish

      # Sign & Publish Firefox Extension (using Mozilla's official first-party web-ext tool)
      - name: Publish to Firefox Add-ons
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: |
          npx web-ext@8.3.0 sign \
            --api-key "${{ secrets.FIREFOX_JWT_ISSUER }}" \
            --api-secret "${{ secrets.FIREFOX_JWT_SECRET }}" \
            --source-dir "dist-firefox" \
            --channel "listed"

      # Publish to Microsoft Edge Add-ons (using stable Edge deploy action)
      - name: Publish to Edge Add-ons
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: wipflip/edge-addons-deploy@v2
        with:
          product-id: '8625c6d0-b5fb-4f8d-80e9-7f866bbf2323'
          zip-path: 'json-query-tool-chrome.zip'
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          client-secret: ${{ secrets.EDGE_CLIENT_SECRET }}
