name: Build and Package Extension

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Package Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome Extension
        run: npm run build:chrome

      - name: Build Firefox Extension
        run: npm run build:firefox

      - name: Package Chrome Extension
        run: |
          cd dist-chrome
          zip -r ../json-query-tool-chrome.zip *
          cd ..

      - name: Package Firefox Extension
        run: |
          cd dist-firefox
          zip -r ../json-query-tool-firefox.zip *
          cd ..

      - name: Upload Chrome Artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-query-tool-chrome
          path: json-query-tool-chrome.zip

      - name: Upload Firefox Artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-query-tool-firefox
          path: json-query-tool-firefox.zip

      # Create a GitHub Release and attach the zip packages when a version tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            json-query-tool-chrome.zip
            json-query-tool-firefox.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to Google Chrome Web Store
      - name: Publish to Chrome Web Store
        if: startsWith(github.ref, 'refs/tags/v')
        uses: browser-actions/release-chrome-extension@v3
        with:
          extension-id: 'ghohdnpenjaojhibcjkkmmmnckdgkbhf'
          zip-path: 'json-query-tool-chrome.zip'
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      # Sign & Publish Firefox Extension
      - name: Publish to Firefox Add-ons
        if: startsWith(github.ref, 'refs/tags/v')
        uses: browser-actions/release-firefox-addon@v3
        with:
          extension-id: 'jsonviewer@chirravuris.com'
          zip-path: 'json-query-tool-firefox.zip'
          jwt-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwt-secret: ${{ secrets.FIREFOX_JWT_SECRET }}

      # Publish to Microsoft Edge Add-ons
      - name: Publish to Edge Add-ons
        if: startsWith(github.ref, 'refs/tags/v')
        uses: wipflip/edge-addons-deploy@v2
        with:
          product-id: '8625c6d0-b5fb-4f8d-80e9-7f866bbf2323'
          zip-path: 'json-query-tool-chrome.zip'
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          client-secret: ${{ secrets.EDGE_CLIENT_SECRET }}
